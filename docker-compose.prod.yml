version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raportk-app
    env_file: .env.production
    ports:
      - "3100:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 256M

  postgres:
    image: postgres:15-alpine
    container_name: raportk-db
    env_file: .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-raportk_user}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 256M

  db-backup:
    image: prodrigestivill/postgres-backup-local:15
    container_name: raportk-db-backup
    restart: unless-stopped
    env_file: .env.production
    environment:
      - POSTGRES_HOST=postgres
      - SCHEDULE=@every 6h
      - BACKUP_KEEP_DAYS=7
      - BACKUP_KEEP_WEEKS=4
      - BACKUP_KEEP_MONTHS=2
      - HEALTHCHECK_PORT=8080
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

volumes:
  pgdata:
  uploads:
