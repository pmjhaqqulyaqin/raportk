<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- PWA: Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/pwa-icon-180x180.png" />

    <!-- PWA: Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA: Theme & Status Bar -->
    <meta name="theme-color" content="#1E40AF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Raport TK" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Raport TK" />
    <meta name="msapplication-TileColor" content="#1E40AF" />
    <meta name="msapplication-TileImage" content="/pwa-icon-192x192.png" />

    <!-- SEO -->
    <meta name="description" content="Raport TK - Aplikasi cetak raport digital untuk TK/PAUD" />

    <title>Raport TK</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  </head>
  <body>
    <div id="root">
      <!-- Splash Screen — visible until React mounts -->
      <div id="splash-screen" style="min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#0F172A 0%,#1E293B 100%);gap:24px;">
        <img src="/logo.png" alt="Logo" style="width:96px;height:96px;border-radius:24px;object-fit:contain;animation:pulse-logo 2s ease-in-out infinite;" />
        <div style="color:#94a3b8;font-family:Inter,sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;">Memuat Aplikasi...</div>
        <div style="width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#3b82f6;border-radius:50%;animation:spin .8s linear infinite;"></div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse-logo { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.05); opacity:0.85; } }
      </style>
    </div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- PWA: Early capture of install prompt + Service Worker -->
    <script>
      window.__pwaInstallEvent = null;
      window.__pwaInstallCallbacks = [];
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallEvent = e;
        console.log('[PWA] beforeinstallprompt captured early');
        window.__pwaInstallCallbacks.forEach(function(cb) { cb(e); });
      });

      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('[PWA] Service Worker registered, scope:', reg.scope);
              setInterval(function() { reg.update(); }, 60 * 60 * 1000);
            })
            .catch(function(err) {
              console.warn('[PWA] Service Worker registration failed:', err);
            });
        });
      }
    </script>
  </body>
</html>
